name: topup
description: "UAE Phone Top-Up App — Clean Architecture, Bloc, Hive Offline Support"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^9.2.1

  # Functional Error Handling
  dartz: ^0.10.1

  # Local Storage (Hive)
  hive_flutter: ^1.1.0

  # Connectivity
  connectivity_plus: ^5.0.2

  # Fonts
  google_fonts: ^6.2.1

  # Routing
  go_router: ^17.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Hive Code Generation
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

  # Testing
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
